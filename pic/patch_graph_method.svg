  <text x="78" y="425" font-family="Arial, Microsoft YaHei, sans-serif" font-size="13" fill="#374151">P in R^{B x L x D}</text>
  <text x="78" y="460" font-family="Arial, Microsoft YaHei, sans-serif" font-size="13" fill="#374151">A_sem = topk(cos(P_i,P_j))</text>
