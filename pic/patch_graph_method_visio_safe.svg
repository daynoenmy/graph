<text x="70" y="45" font-family="Arial" font-size="26" font-weight="bold" fill="#111827">Patch-level Graph Enhanced AA-CLIP</text>
<text x="70" y="76" font-family="Arial" font-size="15" font-weight="normal" fill="#111827">CLIP patch tokens are converted into a semantic-spatial graph before text similarity.</text>
<text x="70" y="230" font-family="Arial" font-size="16" font-weight="bold" fill="#111827">Graph construction: A = alpha * A_semantic + (1-alpha) * A_spatial</text>
<text x="70" y="255" font-family="Arial" font-size="14" font-weight="normal" fill="#111827">Graph update: P_out = (1-beta)P + beta * Linear(D^-1/2 A D^-1/2 P)</text>
